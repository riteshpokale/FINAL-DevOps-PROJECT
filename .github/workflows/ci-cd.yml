name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout Code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Build and Push Backend Docker Image (package.json in backend)
      - name: Build and push backend Docker image
        uses: docker/build-push-action@v3
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/nodejs-app:latest

      # 4. Deploy on EC2 (Backend + Copy Frontend + Nginx reload)
      - name: Deploy to EC2 (Backend + Frontend + Nginx reload)
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull latest backend Docker image
            docker pull ${{ secrets.DOCKER_USERNAME }}/nodejs-app:latest
            docker stop node-app || true
            docker rm node-app || true
            docker run -d --name node-app -p 8080:8080 --restart always ${{ secrets.DOCKER_USERNAME }}/nodejs-app:latest

            # Copy frontend static files to Nginx directory
            rm -rf /usr/share/nginx/html/*
            cp -r frontend/* /usr/share/nginx/html/

            # Reload Nginx to apply changes
            sudo systemctl restart nginx
